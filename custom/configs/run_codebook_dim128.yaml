# Semantic Codebook VQ-VAE config for Stage 1 (Dim 128)
# Same as exp_shared_head but with codebook size 128

experiment:
  name: "exp_shared_head_dim128"
  seed: 42

runtime:
  device: "cuda:3"
  num_workers: 16  # Reduced from 32 to avoid excessive CPU load
  max_steps: 6000
  eval_every: 200
  log_every: 25
  save_every: 500
  warmup_1_steps: 200
  warmup_2_steps: 100
  joints3d_online_std: true
  
  # Advanced VQ stability
  vq_beta_schedule:
    enabled: true
    beta_free: 0.0
    beta_target: 2.5
    phase1_frac: 0.1
    phase2_end_frac: 0.5
    ramp: "linear"
  vq_explore_noise_train_max_steps: 4000
  vq_explore_noise_std_frac: 1.5
  vq_dead_reset_train: true
  vq_dead_reset_warmup_2: false
  
  # Standard codebook init
  codebook_kmeans_init_samples: 5000
  codebook_kmeans_ema_virtual_per_code: 1.0

data:
  source: "mia"
  split: "train"
  train_filelist: "custom/tools/datasetsplits/miaofficial_train.txt"
  batch_size: 32
  percent: 1.0
  step: 30
  require_files:
    - "joints3d.npy"
    - "emgvalues.npy"
  pack:
    mode: "clip"
    clip_len: 5
    flatten_order: "time_major"
  cond: "True"
  std: "False"
  joints3d_root_center: true
  joints3d_root_index: 8

model:
  encoder_decoder_only: false
  
  # Semantic auxiliary loss (H9 style)
  use_semantic_aux: true
  semantic_aux_weight: 0.1
  shared_semantic_head: true
  
  loss_weights:
    joints3d_self: 10.0
    emg_self: 10.0
    joints3d_to_emg: 5.0
    emg_to_joints3d: 5.0
    vq_joints3d: 1.0
    vq_emg: 1.0
    emg_branch: 1.0
  
  modalities:
    joints3d:
      in_dim: 375
      code_dim: 128    # REDUCED TO 128
      hidden_dim: 1024
      token_count: 1
      encoder_type: "unified_tcn"
      decoder_type: "unified_tcn"
      temporal:
        seq_len: 5
        frame_dim: 75
        num_layers: 4
        kernel_size: 3
        dilation_base: 2
        dropout: 0.0
      recon_weight: 1.0
      online_std: true
      std:
        momentum: 0.01
        eps: 1e-6
        clip_std_min: 0.001
    
    emg:
      in_dim: 40
      code_dim: 128    # REDUCED TO 128
      hidden_dim: 1024
      token_count: 1
      encoder_type: "unified_tcn"
      decoder_type: "unified_tcn"
      temporal:
        seq_len: 5
        frame_dim: 8
        num_layers: 4
        kernel_size: 3
        dilation_base: 2
        dropout: 0.0
      recon_weight: 1.0
      online_std: true
      std:
        momentum: 0.01
        eps: 1e-6
        clip_std_min: 0.001

  vq:
    num_codes: 128
    code_dim: 128    # REDUCED TO 128
    decay: 0.99
    eps: 1e-5
    beta: 0.25
    reset_dead_codes: true
    dead_code_threshold: 5e-5
    reset_samples: 8192
    reset_interval: 200

optimizer:
  lr: 1e-5
  lr_min: 6e-7
  weight_decay: 5e-6
  lr_schedule: "warmup_cosine"
  lr_warmup_steps: 600

checkpoints:
  dir: "custom/checkpoints/new_clip5_codebook_with_exerciseloss/exp_shared_head_dim128"
