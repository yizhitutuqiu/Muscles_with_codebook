eval_mode: "ood_exercise" # choices: "id", "ood_exercise", "ood_person"

task: "emg2pose" # choices: "pose2emg", "emg2pose"
dataset_root: "/data/litengmo/HSMR/mia_custom/MIADatasetOfficial"
phase: "val"
n_per_exercise: 5
seed: 1556738
max_exercises: -1

filter_worst_n: 0 # if > 0, only visualize the n samples with highest RMSE per exercise
filter_our_best_diff_n: 3 # if > 0, only visualize the n samples with max (official_rmse - our_rmse)
filter_our_max_rmse_threshold: 0.1 # if < 999.0, only consider samples where our model's RMSE is <= this threshold
filter_diversity_target: "exercise" # choices: "exercise", "subject", "none". guarantees each selected sample belongs to a different target.
filter_global_random_n: 0 # if > 0, randomly select n samples from different targets globally

export_static_details: true # if true, saves a details/ directory per video with static motion sequence and EMG plot
static_details_n_frames: 6 # number of frames to sample for the static motion sequence
static_details_min_alpha: 0.7 # minimum alpha (opacity) for the earliest frame in the sequence
static_details_step_ratio: 0.8 # multiplier for the distance between consecutive skeletons (lower = closer)
static_details_emg_vmax: 120 # maximum EMG value for mesh coloring (values above this will be fully red)

