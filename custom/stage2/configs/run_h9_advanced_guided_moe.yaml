name: "batch_stage2_h9_advanced_guided_moe"
gpus: [4, 5, 6, 7]

base_config: "custom/stage2/configs/stage2_clip5_h2_nocond.yaml"
checkpoint_dir: "custom/stage2/checkpoints/batch_stage2_h9"
csv_output: "custom/stage2/checkpoints/batch_stage2_h9/summary.csv"

experiments:
  - name: "exp_h9_baseline_8exp"
    methods:
      stage1:
        checkpoint: "custom/checkpoints/new_clip5_codebook_with_exerciseloss/exp_shared_head/best.pt"
    model:
      fusion_type: "symmetric_dcsa"
      temporal_type: "dstformer_v5_guided_moe"
      dst_v5_guided_moe:
        num_experts: 8
        guide_mode: "none"
    data:
      batch_size: 16
      
  - name: "exp_h9_guided_gated"
