experiment:
  name: stage2_with_clip5temp_cond
  seed: 42

runtime:
  device: cuda
  num_workers: 8
  log_every: 25
  max_steps: 20000
  save_every: 1000
  eval_every: 400
  grad_clip_norm: 1.0
  distributed:
    enabled: true
    gpus: [2, 3, 4, 5, 6, 7]
    backend: nccl

optimizer:
  lr: 0.0001
  weight_decay: 0.00005
  warmup_steps: 600
  lr_schedule: cosine_annealing
  lr_min: 8.0e-6

data:
  split: train
  batch_size: 32
  step: 30
  joints3d_root_center: true
  joints3d_root_index: 8
  cond: "True"
  std: "False"
  percent: 1.0
  emg_normalize_target: true
  train_filelist: custom/tools/datasetsplits/miaofficial_train.txt
  val_filelist: custom/tools/datasetsplits/miaofficial_val_eval.txt
  max_samples: null
  require_files:
    - emgvalues.npy
    - joints3d.npy

stage1:
  checkpoint: custom/checkpoints/batch_codebook/clip_5_code_256/best.pt

checkpoints:
  dir: custom/stage2/checkpoints/stage2_with_clip5temp_cond

model:
  token_count: 1
  dim: 256
  cont_encoder_type: joint_25
  cont_hidden_dim: 1024
  cont_joint_hidden_dim: 128

  fusion_type: dcsa_asymmetric
  dcsa:
    dim: 256
    num_heads: 8
    dropout: 0.15
  dcsa_asymmetric:
    dim: 256
    num_heads: 8
    dropout: 0.15

  temporal_type: dstformer
  dst:
    dim: 256
    num_heads: 8
    mlp_ratio: 4.0
    dropout: 0.1
    attn_dropout: 0.1
    num_layers: 4

  emg_head_type: flatten
  emg_hidden: 256
  emg_mixer_hidden_dim: 256
  emg_mixer_num_layers: 4
  emg_pred_mode: full
  max_seq_len: 256
  use_cond: true